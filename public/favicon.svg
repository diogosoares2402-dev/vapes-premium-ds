<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="512" height="512" fill="#090909"/>
  
  <!-- Gradient Definition -->
  <defs>
    <linearGradient id="neonGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00BFFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7B2FFF;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Circle Background -->
  <circle cx="256" cy="256" r="180" fill="url(#neonGradient)" opacity="0.2"/>
  
  <!-- VP Text -->
  <text x="256" y="290" font-family="Inter, sans-serif" font-size="140" font-weight="900" text-anchor="middle" fill="url(#neonGradient)">
    VP
  </text>
  
  <!-- Border Circle -->
  <circle cx="256" cy="256" r="240" fill="none" stroke="url(#neonGradient)" stroke-width="2" opacity="0.5"/>
</svg>
